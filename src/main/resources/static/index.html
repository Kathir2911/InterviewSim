<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewSim - AI Interview Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background: #f9f9f9;
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        
        textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .conversation {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
        }
        
        .interviewer {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
        }
        
        .candidate {
            background: #f3e5f5;
            border-left: 4px solid #9c27b0;
        }
        
        .message strong {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status.ongoing {
            background: #e8f5e8;
            color: #2e7d32;
        }
        
        .status.completed {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status.cancelled {
            background: #ffebee;
            color: #d32f2f;
        }
        
        .score {
            font-size: 1.2em;
            font-weight: 600;
            color: #667eea;
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .error {
            background: #ffebee;
            color: #d32f2f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 InterviewSim</h1>
            <p>AI-Powered Technical Interview Simulator</p>
        </div>
        
        <div class="content">
            <!-- Start Interview Section -->
            <div class="section" id="startSection">
                <h2>Start New Interview</h2>
                <div class="form-group">
                    <label for="problemStatement">Problem Statement:</label>
                    <textarea id="problemStatement" placeholder="Enter the coding problem you want to practice with...">
                    </textarea>
                </div>
                <button onclick="startInterview()">Start Interview</button>
            </div>
            
            <!-- Interview Session Section -->
            <div class="section hidden" id="sessionSection">
                <h2>Interview Session</h2>
                <div id="sessionInfo">
                    <p><strong>Session ID:</strong> <span id="sessionId"></span></p>
                    <p><strong>Status:</strong> <span id="sessionStatus" class="status"></span></p>
                    <p><strong>Score:</strong> <span id="sessionScore" class="score"></span></p>
                </div>
                
                <div class="conversation" id="conversation"></div>
                
                <div class="form-group">
                    <label for="answer">Your Answer:</label>
                    <textarea id="answer" placeholder="Type your response here..."></textarea>
                </div>
                
                <div>
                    <button onclick="submitAnswer()" id="submitBtn">Submit Answer</button>
                    <button onclick="endInterview()" id="endBtn">End Interview</button>
                    <button onclick="cancelInterview()" id="cancelBtn">Cancel Interview</button>
                </div>
            </div>
            
            <!-- Results Section -->
            <div class="section hidden" id="resultsSection">
                <h2>Interview Results</h2>
                <div id="finalResults"></div>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        const API_BASE = '/api/v1/interview';
        
        async function startInterview() {
            const problemStatement = document.getElementById('problemStatement').value.trim();
            
            if (!problemStatement) {
                showError('Please enter a problem statement');
                return;
            }
            
            try {
                showLoading('Starting interview...');
                
                const response = await fetch(`${API_BASE}/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ problemStatement })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const session = await response.json();
                currentSessionId = session.id;
                
                hideLoading();
                showSession(session);
                showSuccess('Interview started successfully!');
                
            } catch (error) {
                hideLoading();
                showError('Failed to start interview: ' + error.message);
            }
        }
        
        async function submitAnswer() {
            const answer = document.getElementById('answer').value.trim();
            
            if (!answer) {
                showError('Please enter an answer');
                return;
            }
            
            if (!currentSessionId) {
                showError('No active session');
                return;
            }
            
            try {
                showLoading('Submitting answer...');
                
                const response = await fetch(`${API_BASE}/${currentSessionId}/answer`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ answer })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const session = await response.json();
                
                hideLoading();
                updateSession(session);
                document.getElementById('answer').value = '';
                
            } catch (error) {
                hideLoading();
                showError('Failed to submit answer: ' + error.message);
            }
        }
        
        async function endInterview() {
            if (!currentSessionId) {
                showError('No active session');
                return;
            }
            
            try {
                showLoading('Ending interview...');
                
                const response = await fetch(`${API_BASE}/${currentSessionId}/end`, {
                    method: 'PUT'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const session = await response.json();
                
                hideLoading();
                showResults(session);
                showSuccess('Interview completed!');
                
            } catch (error) {
                hideLoading();
                showError('Failed to end interview: ' + error.message);
            }
        }
        
        async function cancelInterview() {
            if (!currentSessionId) {
                showError('No active session');
                return;
            }
            
            try {
                showLoading('Cancelling interview...');
                
                const response = await fetch(`${API_BASE}/${currentSessionId}/cancel`, {
                    method: 'PUT'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                hideLoading();
                resetInterface();
                showSuccess('Interview cancelled');
                
            } catch (error) {
                hideLoading();
                showError('Failed to cancel interview: ' + error.message);
            }
        }
        
        function showSession(session) {
            document.getElementById('startSection').classList.add('hidden');
            document.getElementById('sessionSection').classList.remove('hidden');
            updateSession(session);
        }
        
        function updateSession(session) {
            document.getElementById('sessionId').textContent = session.id;
            document.getElementById('sessionStatus').textContent = session.status;
            document.getElementById('sessionStatus').className = `status ${session.status.toLowerCase()}`;
            document.getElementById('sessionScore').textContent = session.score.toFixed(1);
            
            updateConversation(session.conversationLog);
            
            const isActive = session.status === 'ONGOING';
            document.getElementById('submitBtn').disabled = !isActive;
            document.getElementById('endBtn').disabled = !isActive;
            document.getElementById('cancelBtn').disabled = !isActive;
        }
        
        function updateConversation(conversationLog) {
            const conversation = document.getElementById('conversation');
            conversation.innerHTML = '';
            
            if (!conversationLog) return;
            
            const lines = conversationLog.split('\n').filter(line => line.trim());
            
            lines.forEach(line => {
                if (line.startsWith('Interviewer:')) {
                    const message = document.createElement('div');
                    message.className = 'message interviewer';
                    message.innerHTML = `<strong>Interviewer</strong>${line.substring(12)}`;
                    conversation.appendChild(message);
                } else if (line.startsWith('Candidate:')) {
                    const message = document.createElement('div');
                    message.className = 'message candidate';
                    message.innerHTML = `<strong>Candidate</strong>${line.substring(10)}`;
                    conversation.appendChild(message);
                }
            });
            
            conversation.scrollTop = conversation.scrollHeight;
        }
        
        function showResults(session) {
            document.getElementById('sessionSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            
            const results = document.getElementById('finalResults');
            results.innerHTML = `
                <div class="message">
                    <h3>Final Score: ${session.score.toFixed(1)}/10</h3>
                    <p><strong>Status:</strong> ${session.status}</p>
                    ${session.feedback ? `<div style="margin-top: 15px;"><strong>Feedback:</strong><br><pre style="white-space: pre-wrap; font-family: inherit;">${session.feedback}</pre></div>` : ''}
                </div>
                <button onclick="resetInterface()" style="margin-top: 15px;">Start New Interview</button>
            `;
        }
        
        function resetInterface() {
            currentSessionId = null;
            document.getElementById('sessionSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('startSection').classList.remove('hidden');
            document.getElementById('answer').value = '';
            clearMessages();
        }
        
        function showLoading(message) {
            clearMessages();
            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.id = 'loadingMessage';
            loading.textContent = message;
            document.querySelector('.content').insertBefore(loading, document.querySelector('.content').firstChild);
        }
        
        function hideLoading() {
            const loading = document.getElementById('loadingMessage');
            if (loading) loading.remove();
        }
        
        function showError(message) {
            clearMessages();
            const error = document.createElement('div');
            error.className = 'error';
            error.textContent = message;
            document.querySelector('.content').insertBefore(error, document.querySelector('.content').firstChild);
            setTimeout(() => error.remove(), 5000);
        }
        
        function showSuccess(message) {
            clearMessages();
            const success = document.createElement('div');
            success.className = 'success';
            success.textContent = message;
            document.querySelector('.content').insertBefore(success, document.querySelector('.content').firstChild);
            setTimeout(() => success.remove(), 3000);
        }
        
        function clearMessages() {
            document.querySelectorAll('.error, .success, .loading').forEach(el => el.remove());
        }
        
        // Enable Enter key to submit answer
        document.getElementById('answer').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                submitAnswer();
            }
        });
    </script>
</body>
</html>
