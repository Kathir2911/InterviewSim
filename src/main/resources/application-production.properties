# Production Configuration
spring.application.name=InterviewSim

# Server Configuration
server.port=${PORT:8080}

# Database Configuration (H2 for demo - no external DB needed)
spring.datasource.url=jdbc:h2:mem:interviewsim
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.h2.console.enabled=false

# Ollama Configuration (Fallback mode for demo)
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2}
ollama.timeout=${OLLAMA_TIMEOUT:30}

# Logging
logging.level.com.kathir.InterviewSim=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Security
spring.jpa.open-in-view=false