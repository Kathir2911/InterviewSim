spring.application.name=InterviewSim
spring.datasource.url=jdbc:mysql://localhost:3306/interviewsim?useSSL=false&ServerTimezone=UTC
spring.config.import=optional:file:.env[.properties]
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
sping.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ollama Configuration
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2}
ollama.timeout=${OLLAMA_TIMEOUT:30}
