version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: interviewsim-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: interviewsim
      MYSQL_USER: interviewsim_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - interviewsim-network

  app:
    build: .
    container_name: interviewsim-app
    environment:
      DB_USERNAME: interviewsim_user
      DB_PASSWORD: password
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - interviewsim-network
    volumes:
      - .env:/app/.env:ro

volumes:
  mysql_data:

networks:
  interviewsim-network:
    driver: bridge